<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - KisanConnect Local</title>

<link rel="stylesheet" href="css/contact.css">
<link rel="stylesheet" href="./css/style.css">
</head>

<body>
     <!-- HEADER -->
    <header class="navbar">
        <h2>KisanConnect Local</h2>

        <div class="menu-toggle" id="menuToggle">&#9776;</div>

        <nav id="navLinks">
            <a href="index.html" data-key="navbar_home"></a>
            <a href="register.html" data-key="navbar_register"></a>
            <a href="login.html" data-key="navbar_login"></a>
            <a href="contact.html" data-key="navbar_contact"></a>

            <select id="languageSelect">
                <option value="en">English</option>
                <option value="mr">मराठी</option>
            </select>
        </nav>
    </header>

        <!-- //linking footer file -->
     <div id="footer-placeholder"></div>

<!-- Add this script right before the closing </body> tag -->
<script>
  fetch('footer.html')
    .then(response => {
      if (!response.ok) throw new Error("Footer file not found");
      return response.text();
    })
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
    })
    .catch(error => console.error('Error loading footer:', error));
</script>
</html>
