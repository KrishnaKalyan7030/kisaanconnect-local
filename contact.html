<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="contact_page_title">Contact | KisanConnect Local</title>

        <nav id="navLinks">

    <!-- FOOTER -->

        <p data-key="footer_text"></p>
    </footer>

    <!-- Scripts -->
    <script src="js/language.js"></script>
