<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-key="login_page_title">Login | KisanConnect Local</title>
  <link rel="stylesheet" href="css/style.css">

</head>

<body class="login-page">

  <!-- HEADER -->
  <header class="navbar">
    <div class="logo">KisanConnect Local</div>

    <div class="menu-toggle" id="menuToggle">&#9776;</div>

    <nav id="navLinks">
      <a href="index.html" data-key="navbar_home"></a>
      <a href="register.html" data-key="navbar_register"></a>
      <a href="login.html" data-key="navbar_login"></a>

      <select id="languageSelect">
        <option value="en">English</option>
        <option value="mr">मराठी</option>
      </select>
    </nav>
  </header>

  <!-- LOGIN FORM -->
  <form id="loginForm">

    <h2 data-key="login_title"></h2>

    <input type="text" id="phone" data-key="phone_placeholder" placeholder="Phone No"required>

    <input type="password" id="password" data-key="password_placeholder" placeholder="Password" required>

    <button type="submit" data-key="login_button" placeholder="Submit"></button>

  </form>

  <!-- Scripts -->
  <script src="js/language.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
